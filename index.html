<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>泰国建材产品目录</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --bg: #121212;
            --surface: #1e1e1e;
            --surface2: #2a2a2a;
            --surface3: #333;
            --border: #3a3a3a;
            --text: #e0e0e0;
            --text2: #a0a0a0;
            --text3: #666;
            --accent: #4fc3f7;
            --accent2: #0288d1;
            --price: #ef5350;
            --hover: #2d3a4a;
        }
        body { font-family: -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif; background: var(--bg); color: var(--text); }

        /* 顶部栏 */
        .topbar { background: #0a0a0a; padding: 12px 16px; display: flex; align-items: center; gap: 12px; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid var(--border); flex-wrap: wrap; }
        .topbar h1 { font-size: 16px; font-weight: 600; color: #fff; white-space: nowrap; }
        .topbar .stats { font-size: 12px; color: var(--text2); white-space: nowrap; }
        .src-filter { display: flex; gap: 5px; flex-wrap: wrap; }
        .src-btn { padding: 3px 10px; border-radius: 12px; border: 1px solid var(--border); background: transparent; color: var(--text2); font-size: 11px; cursor: pointer; transition: all .2s; white-space: nowrap; }
        .src-btn:hover { border-color: var(--accent); color: var(--accent); }
        .src-btn.active { background: var(--accent2); border-color: var(--accent2); color: #fff; }

        /* 布局 */
        .layout { display: flex; min-height: calc(100vh - 52px); }

        /* 侧边栏 */
        .sidebar { width: 270px; background: var(--surface); border-right: 1px solid var(--border); overflow-y: auto; flex-shrink: 0; display: flex; flex-direction: column; }
        .search-box { padding: 10px 12px; border-bottom: 1px solid var(--border); position: sticky; top: 0; background: var(--surface); z-index: 10; }
        .search-box input { width: 100%; padding: 8px 11px; border: 1px solid var(--border); background: var(--bg); color: var(--text); border-radius: 8px; font-size: 13px; outline: none; }
        .search-box input:focus { border-color: var(--accent); }
        .search-box input::placeholder { color: var(--text3); }

        /* 分类树 */
        .cat-tree { padding: 6px 0; flex: 1; }
        .tree-label { display: flex; align-items: center; padding: 6px 12px; cursor: pointer; font-size: 13px; color: var(--text2); transition: background .15s; user-select: none; }
        .tree-label:hover { background: var(--hover); color: var(--text); }
        .tree-label.active { background: var(--accent2); color: #fff; }
        .tree-label.active:hover { background: var(--accent2); }
        .tree-label.active-leaf { background: #1a3a4a; color: var(--accent); border-left: 2px solid var(--accent); padding-left: 10px; }
        .tree-label.active-leaf:hover { background: #1a3a4a; }
        .tree-toggle { width: 15px; height: 15px; display: flex; align-items: center; justify-content: center; margin-right: 4px; font-size: 9px; color: var(--text3); flex-shrink: 0; transition: transform .2s; }
        .tree-toggle.open { transform: rotate(90deg); }
        .tree-toggle.leaf-toggle { visibility: hidden; }
        .tree-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .tree-count { font-size: 11px; color: var(--text3); margin-left: 5px; flex-shrink: 0; }
        .tree-label.active .tree-count { color: rgba(255,255,255,.5); }
        .tree-children { display: none; padding-left: 10px; }
        .tree-children.open { display: block; }
        .l2 > .tree-label { padding-left: 28px; }
        .l3 > .tree-label { padding-left: 44px; font-size: 12px; }
        .l4 > .tree-label { padding-left: 60px; font-size: 12px; }

        /* 主内容 */
        .main { flex: 1; padding: 14px 18px; overflow-y: auto; min-width: 0; }
        .main-header { display: flex; align-items: center; gap: 7px; margin-bottom: 14px; flex-wrap: wrap; }
        .sort-btn { padding: 6px 13px; border: 1px solid var(--border); background: var(--surface); color: var(--text2); border-radius: 6px; cursor: pointer; font-size: 13px; }
        .sort-btn:hover { border-color: var(--accent); color: var(--accent); }
        .sort-btn.active { background: var(--accent2); color: #fff; border-color: var(--accent2); }
        .main-stats { font-size: 13px; color: var(--text2); margin-left: auto; }
        .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(165px, 1fr)); gap: 12px; }

        /* 产品卡片 */
        .product-card { background: var(--surface); border-radius: 10px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,.3); transition: box-shadow .2s, transform .2s; cursor: pointer; display: flex; flex-direction: column; border: 1px solid var(--border); }
        .product-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,.5); transform: translateY(-2px); }
        .product-card .img-wrap { width: 100%; aspect-ratio: 1; background: var(--surface2); display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .product-card img { width: 100%; height: 100%; object-fit: cover; }
        .product-card .no-img { color: var(--text3); font-size: 12px; }
        .product-card .info { padding: 9px; flex: 1; display: flex; flex-direction: column; }
        .product-card .name { font-size: 12px; color: var(--text); line-height: 1.4; height: 34px; overflow: hidden; margin-bottom: 7px; }
        .product-card .price { font-size: 14px; font-weight: bold; color: var(--price); margin-top: auto; }
        .product-card .source { font-size: 11px; color: var(--text3); margin-top: 4px; }

        /* 分页 */
        .pagination { padding: 12px 18px; text-align: center; background: var(--surface); border-top: 1px solid var(--border); position: sticky; bottom: 0; }
        .pagination button { padding: 6px 13px; margin: 0 3px; border: 1px solid var(--border); background: var(--surface2); color: var(--text2); cursor: pointer; border-radius: 6px; font-size: 13px; }
        .pagination button:hover { border-color: var(--accent); color: var(--accent); }
        .pagination button:disabled { opacity: .35; cursor: not-allowed; }
        .pagination button.active { background: var(--accent2); color: #fff; border-color: var(--accent2); }
        .pagination .page-info { margin-left: 12px; color: var(--text3); font-size: 13px; }

        /* 加载/无结果 */
        .loading, .no-results { text-align: center; padding: 80px 20px; color: var(--text3); font-size: 15px; }

        /* 详情弹窗 */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,.7); z-index: 200; }
        .modal.show { display: flex; align-items: center; justify-content: center; padding: 20px; }
        .modal-content { background: var(--surface); border-radius: 12px; width: 100%; max-width: 480px; max-height: 90vh; overflow-y: auto; border: 1px solid var(--border); }
        .modal-header { padding: 14px 16px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .modal-header h3 { font-size: 15px; font-weight: 500; flex: 1; padding-right: 10px; color: var(--text); line-height: 1.4; }
        .modal-close { background: none; border: none; font-size: 22px; cursor: pointer; color: var(--text3); }
        .modal-close:hover { color: var(--text); }
        .modal-body { padding: 14px 16px; }
        .modal-body img { width: 100%; max-height: 260px; object-fit: contain; background: var(--surface2); border-radius: 8px; margin-bottom: 14px; }
        .modal-row { display: flex; padding: 10px 0; border-bottom: 1px solid var(--border); }
        .modal-label { width: 65px; color: var(--text3); font-size: 13px; flex-shrink: 0; }
        .modal-value { flex: 1; font-size: 13px; color: var(--text); }
        .modal-price { color: var(--price) !important; font-size: 18px !important; font-weight: bold; }
        .modal-source { display: inline-block; padding: 3px 8px; background: rgba(79,195,247,.15); color: var(--accent); border-radius: 4px; font-size: 12px; }

        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

        @media (max-width: 768px) {
            .layout { flex-direction: column; }
            .sidebar { width: 100%; max-height: 45vh; }
            .products-grid { grid-template-columns: repeat(2, 1fr); gap: 9px; }
            .src-filter { display: none; }
            .topbar { gap: 8px; }
        }
    </style>
</head>

    try {
        var loadingEl = document.getElementById('loading');
        loadingEl.textContent = '正在加载产品数据...';

        // 只加载最小的3个文件
        var chunks = ['products_1.json','products_2.json','products_3.json'];
        allProducts = [];
        for (var url of chunks) {
            var r = await fetch(url);
            var data = await r.json();
            allProducts = allProducts.concat(data);
        }
        
        // 如果单个 products_all.json 存在（备用）
        // var r = await fetch('products_all.json');
        // allProducts = await r.json();

        buildCatMeta();
        buildCatTree();
        filterAndSort();
    } catch (e) {
        console.error(e);
        document.getElementById('loading').textContent = '加载失败: ' + e.message;

}

var SKIP_WORDS = {'的','是','在','和','了','有','个','与','或','等','为','以','及','于','中','由','所','从','到','把','被','让','给','比','更','最','较','只','也','都','还','很','就','而','但','却','已','正在','可以','能够','应该','需要','包装','规格','型号','颜色','品牌','材质','尺寸','容量','功率','电压','数量','单位','产地','直销','工厂'};

function findL1ByName(nameLower) {
    var bestScore = 0, bestL1 = '未分类';
    L1_DEFS.forEach(function(def) {
        if (def.id === 'uncategorized') return;
        var score = 0;
        def.kws.forEach(function(kw) {
            if (nameLower.indexOf(kw.toLowerCase()) !== -1) score++;
        });
        if (score > bestScore) { bestScore = score; bestL1 = def.name; }
    });
    // Promotion check
    L1_DEFS.forEach(function(def) {
        if (def.id !== 'promotion') return;
        def.kws.forEach(function(kw) {
            if (nameLower.indexOf(kw.toLowerCase()) !== -1) bestL1 = def.name;
        });
    });
    return bestScore > 0 ? bestL1 : '未分类';
}

function buildCatMeta() {
    // Build tree: L1 → L2 → L3 from products
    var tree = {};  // l1 → l2 → l3 → count

    allProducts.forEach(function(p) {
        var catParts = (p.category_zh || '').split('|').map(function(c) { return c.trim(); }).filter(Boolean);
        var catFirst = catParts[0] || '';
        var nameFull = ((p.name_zh || p.name || '') + ' ' + catFirst).toLowerCase();

        var l1 = findL1ByName(nameFull);
        var l2 = catParts.length >= 2 ? catParts[1] : l1;
        var l3 = catParts.length >= 3 ? catParts[2] : '';

        // Map known top-level categories to L1
        var CAT_ALIAS = {
            '浴室': '卫浴/卫生间', '沐浴': '卫浴/卫生间',
            '厨房': '厨房', '任何家': '厨房',
            '电力和照明': '电气/照明', '电气工程': '电气/照明', '电力工程': '电气/照明',
            '建筑材料': '建筑材料',
            '供水系统': '管道/供水',
            '手动工具和五金件': '五金/工具', '手动工具/建筑材料': '五金/工具',
            '空调及电器': '家电', '电器/电子产品': '家电',
            '家具': '家具/软装',
            '瓷砖/设备': '瓷砖/地板',
            '门窗': '门窗',
            '表面及装饰材料': '瓷砖/地板', '层压板覆盖表面': '瓷砖/地板',
            '颜色和装备': '化工/涂料',
            '五金/化工': '五金/工具', '五金/化学品': '化工/涂料',
            '花园DIY管道系统': '户外/园艺', '农业设备/园艺/供水系统': '户外/园艺',
            '农业设备/园艺/给水系统': '户外/园艺',
            '灯/照明': '电气/照明', '灯具/照明': '电气/照明',
            '建筑材料 > 屋顶/屋顶配件 > 波纹屋顶瓦/设备': '建筑材料',
            '促销高达 85%': '促销/特惠',
            '家居装饰': '家具/软装',
            '钢材': '建筑材料', '纤维水泥/胶合板/石膏/聚乙烯/SPC': '建筑材料',
            '强化木地板/地毯/地板': '瓷砖/地板',
            '窗帘/地毯': '家具/软装',
            '清洁/洗涤设备': '清洁/收纳',
            '床垫/床上用品/毛巾': '家具/软装',
            '货架仓储设备': '收纳/仓储',
            '门/窗/檐口/栅栏/楼梯': '门窗',
            '电气工作': '电气/照明',
            '电力工程': '电气/照明',
            '花园家具/户外装饰': '户外/园艺'
        };

        if (CAT_ALIAS[catFirst]) l1 = CAT_ALIAS[catFirst];
        if (!l2) l2 = l1;
        if (catFirst === '其他' || catFirst === '') {
            l1 = '未分类';
            l2 = '未分类';
            l3 = '';
        }

        if (!tree[l1]) tree[l1] = { _cnt: 0, children: {} };
        tree[l1]._cnt++;
        if (!tree[l1].children[l2]) tree[l1].children[l2] = { _cnt: 0, children: {} };
        tree[l1].children[l2]._cnt++;
        if (l3) {
            if (!tree[l1].children[l2].children[l3]) tree[l1].children[l2].children[l3] = 0;
            tree[l1].children[l2].children[l3]++;
        }
    });

    catMeta = tree;
}

// ─── 数据源筛选 ─────────────────────────────────────────────────────────────
function buildSrcFilter() {
    var srcCount = {};
    allProducts.forEach(function(p) { if (p.source) srcCount[p.source] = (srcCount[p.source] || 0) + 1; });
    var sorted = Object.entries(srcCount).sort(function(a, b) { return b[1] - a[1]; });

    var container = document.getElementById('srcFilter');
    container.innerHTML = sorted.map(function(entry) {
        return '<button class="src-btn" data-src="' + entry[0] + '" onclick="setSrc(\'' + entry[0] + '\',this)">' + entry[0] + ' (' + entry[1].toLocaleString() + ')</button>';
    }).join('');
}

function setSrc(src, btn) {
    if (currentSrc === src) {
        currentSrc = null;
        btn.classList.remove('active');
    } else {
        document.querySelectorAll('.src-btn').forEach(function(b) { b.classList.remove('active'); });
        btn.classList.add('active');
        currentSrc = src;
    }
    currentPage = 1;
    filterAndSort();
}

// ─── 分类树 ─────────────────────────────────────────────────────────────────
var L1_ICONS = {
    '卫浴/卫生间': '🚿', '厨房': '🍳', '瓷砖/地板': '🧱', '电气/照明': '💡',
    '建筑材料': '🏗️', '管道/供水': '🔧', '门窗': '🚪', '五金/工具': '🔩',
    '家电': '🧊', '家具/软装': '🛋️', '户外/园艺': '🌿', '清洁/收纳': '🧹',
    '化工/涂料': '🎨', '安全/防护': '🦺', '办公/文具': '📎', '促销/特惠': '🏷️',
    '未分类': '❓', '其他': '📦'
};

function buildCatTree() {
    var container = document.getElementById('catTree');
    container.innerHTML = '';

    // "All" entry
    var allEntry = document.createElement('div');
    allEntry.innerHTML = '<div class="tree-label" onclick="selectCatLeaf(\'\',this)">' +
        '<span class="tree-toggle leaf-toggle"></span>' +
        '<span class="tree-name">📦 全部产品</span>' +
        '<span class="tree-count">' + allProducts.length.toLocaleString() + '</span></div>';
    container.appendChild(allEntry);

    // Sort L1 by count
    var sortedL1 = Object.keys(catMeta).sort(function(a, b) {
        return (catMeta[b]._cnt || 0) - (catMeta[a]._cnt || 0);
    });

    sortedL1.forEach(function(l1Name) {
        var l1Data = catMeta[l1Name];
        var l1Node = document.createElement('div');

        var l2Entries = Object.keys(l1Data.children || {}).sort(function(a, b) {
            return ((l1Data.children[b]._cnt || 0)) - ((l1Data.children[a]._cnt || 0));
        });
        var hasChildren = l2Entries.length > 0;
        var icon = L1_ICONS[l1Name] || '📂';
        var l1Cnt = l1Data._cnt || 0;

        l1Node.innerHTML = '<div class="tree-label" onclick="toggleNode(this,event)">' +
            '<span class="tree-toggle' + (hasChildren ? '' : ' leaf-toggle') + '">▶</span>' +
            '<span class="tree-name">' + icon + ' ' + l1Name + '</span>' +
            '<span class="tree-count">' + l1Cnt.toLocaleString() + '</span></div>';

        if (hasChildren) {
            var l2Container = document.createElement('div');
            l2Container.className = 'tree-children';

            l2Entries.slice(0, 40).forEach(function(l2Name) {
                var l2Data = l1Data.children[l2Name];
                var l2Node = document.createElement('div');
                l2Node.className = 'tree-node l2';

                var l3Keys = Object.keys(l2Data.children || {});
                l3Keys.sort(function(a, b) { return (l2Data.children[b] || 0) - (l2Data.children[a] || 0); });
                var hasL3 = l3Keys.length > 0 && l3Keys[0];
                var l2Cnt = l2Data._cnt || 0;

                if (hasL3) {
                    l2Node.innerHTML = '<div class="tree-label" onclick="toggleNode(this,event)">' +
                        '<span class="tree-toggle">▶</span>' +
                        '<span class="tree-name">' + l2Name + '</span>' +
                        '<span class="tree-count">' + l2Cnt.toLocaleString() + '</span></div>';

                    var l3Container = document.createElement('div');
                    l3Container.className = 'tree-children';

                    l3Keys.slice(0, 40).forEach(function(l3Name) {
                        var l3Node = document.createElement('div');
                        l3Node.className = 'tree-node l3';
                        var safeCat = l3Name.replace(/'/g, "\\'");
                        l3Node.innerHTML = '<div class="tree-label tree-leaf" onclick="selectCatLeaf(\'' + safeCat + '\',this)">' +
                            '<span class="tree-toggle leaf-toggle"></span>' +
                            '<span class="tree-name">' + l3Name + '</span>' +
                            '<span class="tree-count">' + ((l2Data.children[l3Name] || 0)).toLocaleString() + '</span></div>';
                        l3Container.appendChild(l3Node);
                    });

                    l2Node.appendChild(l3Container);
                } else {
                    var safeL2 = l2Name.replace(/'/g, "\\'");
                    l2Node.innerHTML = '<div class="tree-label tree-leaf" onclick="selectCatLeaf(\'' + safeL2 + '\',this)">' +
                        '<span class="tree-toggle leaf-toggle"></span>' +
                        '<span class="tree-name">' + l2Name + '</span>' +
                        '<span class="tree-count">' + l2Cnt.toLocaleString() + '</span></div>';
                }

                l2Container.appendChild(l2Node);
            });

            l1Node.appendChild(l2Container);
        }

        container.appendChild(l1Node);
    });
}

function toggleNode(label, event) {
    event.stopPropagation();
    var children = label.parentElement.querySelector(':scope > .tree-children');
    var toggle = label.querySelector('.tree-toggle');
    if (children) {
        var isOpen = children.classList.toggle('open');
        toggle.classList.toggle('open', isOpen);
        toggle.textContent = isOpen ? '▼' : '▶';
    }
}

function selectCatLeaf(catName, label) {
    document.querySelectorAll('.tree-label').forEach(function(l) {
        l.classList.remove('active', 'active-leaf');
    });
    if (label) label.classList.add('active-leaf');
    currentCat = catName || '';
    currentPage = 1;
    filterAndSort();
}

// ─── 搜索 & 过滤 ────────────────────────────────────────────────────────────
function handleSearch() {
    currentPage = 1;
    filterAndSort();
}

function handleSort(btn) {
    document.querySelectorAll('.sort-btn').forEach(function(b) { b.classList.remove('active'); });
    btn.classList.add('active');
    currentSort = btn.dataset.sort;
    currentPage = 1;
    filterAndSort();
}

function filterAndSort() {
    var keyword = document.getElementById('searchInput').value.toLowerCase().trim();

    filteredProducts = allProducts.filter(function(p) {
        if (currentSrc && p.source !== currentSrc) return false;
        if (keyword) {
            var name = (p.name_zh || p.name || '').toLowerCase();
            if (!name.includes(keyword)) return false;
        }
        if (currentCat) {
            var cat = (p.category_zh || '').toLowerCase();
            if (!cat.includes(currentCat.toLowerCase())) return false;
        }
        return true;
    });

    if (currentSort === 'price-asc') {
        filteredProducts.sort(function(a, b) {
            return (parseFloat(a.price) || 999999) - (parseFloat(b.price) || 999999);
        });
    } else if (currentSort === 'price-desc') {
        filteredProducts.sort(function(a, b) {
            return (parseFloat(b.price) || 0) - (parseFloat(a.price) || 0);
        });
    }

    renderProducts();
    renderPagination();
    document.getElementById('mainStats').textContent = '共 ' + filteredProducts.length.toLocaleString() + ' 个';
}

// ─── 渲染 ───────────────────────────────────────────────────────────────────
function renderProducts() {
    var grid = document.getElementById('productGrid');
    var noResults = document.getElementById('noResults');

    if (filteredProducts.length === 0) {
        grid.innerHTML = '';
        noResults.style.display = 'block';
        return;
    }
    noResults.style.display = 'none';

    var start = (currentPage - 1) * pageSize;
    var end = start + pageSize;
    var pageProducts = filteredProducts.slice(start, end);

    grid.innerHTML = pageProducts.map(function(p) {
        var price = p.price ? '฿' + parseFloat(p.price).toLocaleString() : '暂无价格';
        var name = escapeHtml(p.name_zh || p.name || '未知产品');
        var img = p.image_url || '';
        var globalIndex = allProducts.indexOf(p);

        return '<div class="product-card" onclick="showDetail(' + globalIndex + ')">' +
            '<div class="img-wrap">' +
            (img ? '<img src="' + img + '" loading="lazy" alt="">' : '<span class="no-img">暂无图片</span>') +
            '</div><div class="info">' +
            '<div class="name">' + name + '</div>' +
            '<div class="price">' + price + '</div>' +
            '<div class="source">' + (p.source || '') + '</div></div></div>';
    }).join('');
}

function renderPagination() {
    var totalPages = Math.ceil(filteredProducts.length / pageSize);
    var pag = document.getElementById('pagination');

    if (totalPages <= 1) { pag.innerHTML = ''; return; }

    var html = '<button onclick="goToPage(' + (currentPage - 1) + ')" ' + (currentPage === 1 ? 'disabled' : '') + '>上一页</button>';

    var range = 2;
    for (var i = Math.max(1, currentPage - range); i <= Math.min(totalPages, currentPage + range); i++) {
        html += '<button class="' + (i === currentPage ? 'active' : '') + '" onclick="goToPage(' + i + ')">' + i + '</button>';
    }

    html += '<button onclick="goToPage(' + (currentPage + 1) + ')" ' + (currentPage === totalPages ? 'disabled' : '') + '>下一页</button>';
    html += '<span class="page-info">' + currentPage + ' / ' + totalPages + ' 页</span>';
    pag.innerHTML = html;
}

function goToPage(p) {
    var totalPages = Math.ceil(filteredProducts.length / pageSize);
    if (p < 1 || p > totalPages) return;
    currentPage = p;
    renderProducts();
    renderPagination();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ─── 详情 ───────────────────────────────────────────────────────────────────
function showDetail(index) {
    var p = allProducts[index];
    var name = escapeHtml(p.name_zh || p.name || '未知');
    var img = p.image_url || '';

    document.getElementById('modalTitle').textContent = name;
    var imgHtml = img
        ? '<img src="' + img + '" alt="">'
        : '<div style="height:180px;background:var(--surface2);display:flex;align-items:center;justify-content:center;color:var(--text3)">暂无图片</div>';
    var linkHtml = p.url ? '<a href="' + p.url + '" target="_blank" style="color:var(--accent)">打开原网页 →</a>' : '-';

    document.getElementById('modalBody').innerHTML = imgHtml +
        '<div class="modal-row"><span class="modal-label">价格</span><span class="modal-value modal-price">' + (p.price ? '฿' + parseFloat(p.price).toLocaleString() : '暂无价格') + '</span></div>' +
        '<div class="modal-row"><span class="modal-label">来源</span><span class="modal-value"><span class="modal-source">' + (p.source || '未知') + '</span></span></div>' +
        '<div class="modal-row"><span class="modal-label">分类</span><span class="modal-value">' + (p.category_zh || p.category_en || '未分类') + '</span></div>' +
        '<div class="modal-row"><span class="modal-label">品牌</span><span class="modal-value">' + (p.brand || '-') + '</span></div>' +
        '<div class="modal-row"><span class="modal-label">SKU</span><span class="modal-value">' + (p.sku || '-') + '</span></div>' +
        '<div class="modal-row"><span class="modal-label">链接</span><span class="modal-value">' + linkHtml + '</span></div>';

    document.getElementById('modal').classList.add('show');
}

function closeModal() {
    document.getElementById('modal').classList.remove('show');
}

document.getElementById('modal').addEventListener('click', function(e) {
    if (e.target.id === 'modal') closeModal();
});

function escapeHtml(text) {
    var div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

window.addEventListener('DOMContentLoaded', loadData);
</script>
