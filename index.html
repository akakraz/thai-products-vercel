<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>泰国建材产品目录</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #1a1a1a; color: #e0e0e0; min-height: 100vh; }
        
        /* 登录页 */
        .login-container { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .login-box { background: #2d2d2d; padding: 40px; border-radius: 16px; width: 100%; max-width: 360px; text-align: center; }
        .login-box h1 { font-size: 24px; margin-bottom: 30px; color: #e74c3c; }
        .login-box input { width: 100%; padding: 14px; margin-bottom: 15px; border: 1px solid #444; border-radius: 8px; background: #1a1a1a; color: #e0e0e0; font-size: 16px; }
        .login-box button { width: 100%; padding: 14px; background: #e74c3c; color: white; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; }
        .login-box button:hover { background: #c0392b; }
        .login-error { color: #ff6b6b; margin-top: 15px; font-size: 14px; display: none; }
        
        /* 主页面 */
        .main-container { display: none; }
        .main-container.show { display: block; }
        
        /* 顶部搜索栏 */
        .header { position: sticky; top: 0; background: #2d2d2d; padding: 12px 15px; z-index: 100; border-bottom: 1px solid #444; }
        .search-row { display: flex; gap: 10px; margin-bottom: 10px; }
        .search-input { flex: 1; padding: 10px 14px; border: 1px solid #444; border-radius: 8px; background: #1a1a1a; color: #e0e0e0; font-size: 15px; }
        .sort-select { padding: 10px 14px; border: 1px solid #444; border-radius: 8px; background: #1a1a1a; color: #e0e0e0; font-size: 15px; cursor: pointer; }
        
        /* 分类标签 */
        .categories { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 5px; -webkit-overflow-scrolling: touch; }
        .categories::-webkit-scrollbar { display: none; }
        .cat-tag { padding: 6px 14px; background: #3d3d3d; border-radius: 20px; font-size: 13px; white-space: nowrap; cursor: pointer; border: none; color: #e0e0e0; }
        .cat-tag.active { background: #e74c3c; color: white; }
        
        /* 产品网格 */
        .content { padding: 15px; }
        .product-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
        
        /* 产品卡片 */
        .product-card { background: #2d2d2d; border-radius: 10px; overflow: hidden; cursor: pointer; transition: transform 0.2s; }
        .product-card:active { transform: scale(0.98); }
        .product-card img { width: 100%; height: 140px; object-fit: cover; background: #3d3d3d; }
        .product-info { padding: 10px; }
        .product-name { font-size: 13px; color: #e0e0e0; margin-bottom: 6px; height: 36px; overflow: hidden; line-height: 1.3; }
        .product-price { font-size: 15px; font-weight: bold; color: #ff6b6b; }
        
        /* 无图占位 */
        .no-image { width: 100%; height: 140px; background: #3d3d3d; display: flex; align-items: center; justify-content: center; color: #666; font-size: 13px; }
        
        /* 分页 */
        .pagination { padding: 15px; text-align: center; background: #2d2d2d; position: sticky; bottom: 0; border-top: 1px solid #444; }
        .pagination button { padding: 8px 16px; margin: 0 3px; border: 1px solid #444; background: #1a1a1a; color: #e0e0e0; cursor: pointer; border-radius: 6px; font-size: 14px; }
        .pagination button:disabled { opacity: 0.4; }
        .pagination button.active { background: #e74c3c; border-color: #e74c3c; color: white; }
        
        /* 统计 */
        .stats { padding: 10px 15px; background: #252525; font-size: 13px; color: #888; border-bottom: 1px solid #333; }
        
        /* 详情弹窗 */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 200; }
        .modal.show { display: flex; align-items: center; justify-content: center; padding: 20px; }
        .modal-content { background: #2d2d2d; border-radius: 16px; width: 100%; max-width: 500px; max-height: 90vh; overflow-y: auto; }
        .modal-header { padding: 15px; border-bottom: 1px solid #444; display: flex; justify-content: space-between; align-items: center; }
        .modal-header h3 { color: #e0e0e0; font-size: 16px; flex: 1; padding-right: 10px; }
        .modal-close { background: none; border: none; color: #888; font-size: 28px; cursor: pointer; line-height: 1; }
        .modal-body { padding: 15px; }
        .modal-body img { width: 100%; max-height: 280px; object-fit: contain; background: #1a1a1a; border-radius: 8px; margin-bottom: 15px; }
        .detail-row { display: flex; padding: 10px 0; border-bottom: 1px solid #333; }
        .detail-label { width: 70px; color: #888; font-size: 14px; }
        .detail-value { flex: 1; color: #e0e0e0; font-size: 14px; }
        .detail-price { color: #ff6b6b !important; font-size: 20px !important; font-weight: bold; }
        .source-tag { display: inline-block; padding: 3px 8px; background: #444; border-radius: 4px; font-size: 12px; }
        .no-results { text-align: center; padding: 60px 20px; color: #888; font-size: 15px; }
        
        /* 加载中 */
        .loading { text-align: center; padding: 40px; color: #888; }
    </style>
</head>
<body>
    <!-- 登录页 -->
    <div class="login-container" id="loginPage">
        <div class="login-box">
            <h1>🔐 产品目录</h1>
            <input type="text" id="loginId" placeholder="账号" autocomplete="off">
            <input type="password" id="loginPwd" placeholder="密码">
            <button onclick="doLogin()">登录</button>
            <div class="login-error" id="loginError">账号或密码错误</div>
        </div>
    </div>

    <!-- 主页面 -->
    <div class="main-container" id="mainPage">
        <div class="header">
            <div class="search-row">
                <input type="text" class="search-input" id="searchInput" placeholder="搜索产品..." oninput="handleSearch()">
                <select class="sort-select" id="sortSelect" onchange="handleSort()">
                    <option value="default">默认排序</option>
                    <option value="price-asc">价格↑</option>
                    <option value="price-desc">价格↓</option>
                </select>
            </div>
            <div class="categories" id="categories"></div>
        </div>
        <div class="stats" id="stats"></div>
        <div class="content">
            <div class="product-grid" id="productGrid"></div>
            <div class="no-results" id="noResults" style="display:none">未找到产品</div>
        </div>
        <div class="pagination" id="pagination"></div>
    </div>

    <!-- 详情弹窗 -->
    <div class="modal" id="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modalTitle"></h3>
                <button class="modal-close" onclick="closeModal()">&times;</button>
            </div>
            <div class="modal-body" id="modalBody"></div>
        </div>
    </div>

    <script>
        // ==================== 配置区 ====================
        // 设置访问密码（不改这里，改下面两个变量）
        const ACCESS_ID = 'thai2026';
        const ACCESS_PWD = 'products';
        // ================================================

        let products = [];
        let filteredProducts = [];
        let categories = [];
        let currentCategory = 'all';
        let currentSort = 'default';
        let currentPage = 1;
        const pageSize = 40;
        let searchTimeout;

        // 登录
        function doLogin() {
            const id = document.getElementById('loginId').value;
            const pwd = document.getElementById('loginPwd').value;
            if (id === ACCESS_ID && pwd === ACCESS_PWD) {
                document.getElementById('loginPage').style.display = 'none';
                document.getElementById('mainPage').classList.add('show');
                loadData();
            } else {
                document.getElementById('loginError').style.display = 'block';
            }
        }

        // 回车登录
        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('loginPwd').addEventListener('keypress', e => {
                if (e.key === 'Enter') doLogin();
            });
        });

        // 加载数据
        async function loadData() {
            try {
                const res = await fetch('data/products.json');
                products = await res.json();
                buildCategories();
                filterAndSort();
            } catch (e) {
                console.error('加载失败:', e);
                document.getElementById('productGrid').innerHTML = '<div class="loading">加载失败，请刷新重试</div>';
            }
        }

        // 构建分类
        function buildCategories() {
            const catCount = {};
            products.forEach(p => {
                const cat = p.category_zh || p.category || '其他';
                catCount[cat] = (catCount[cat] || 0) + 1;
            });
            
            categories = [{name: '全部', count: products.length, key: 'all'}];
            Object.entries(catCount).sort((a, b) => b[1] - a[1]).forEach(([name, count]) => {
                if (count >= 10) categories.push({name, count, key: name});
            });

            const container = document.getElementById('categories');
            container.innerHTML = categories.map(c => 
                `<button class="cat-tag${c.key === 'all' ? ' active' : ''}" data-cat="${c.key}">${c.name} (${c.count})</button>`
            ).join('');
            
            container.querySelectorAll('.cat-tag').forEach(btn => {
                btn.addEventListener('click', () => selectCategory(btn.dataset.cat));
            });
        }

        // 选择分类
        function selectCategory(cat) {
            currentCategory = cat;
            document.querySelectorAll('.cat-tag').forEach(b => b.classList.remove('active'));
            document.querySelector(`[data-cat="${cat}"]`).classList.add('active');
            filterAndSort();
        }

        // 搜索
        function handleSearch() {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(filterAndSort, 300);
        }

        // 排序
        function handleSort() {
            currentSort = document.getElementById('sortSelect').value;
            filterAndSort();
        }

        // 过滤+排序
        function filterAndSort() {
            const keyword = document.getElementById('searchInput').value.toLowerCase().trim();
            
            filteredProducts = products.filter(p => {
                if (currentCategory !== 'all' && p.category_zh !== currentCategory && p.category !== currentCategory) return false;
                if (keyword) {
                    const name = (p.name_zh || p.name || '').toLowerCase();
                    if (!name.includes(keyword)) return false;
                }
                return true;
            });

            if (currentSort === 'price-asc') {
                filteredProducts.sort((a, b) => (parseFloat(a.price) || 999999) - (parseFloat(b.price) || 999999));
            } else if (currentSort === 'price-desc') {
                filteredProducts.sort((a, b) => (parseFloat(b.price) || 0) - (parseFloat(a.price) || 0));
            }

            currentPage = 1;
            renderProducts();
            renderPagination();
            document.getElementById('stats').textContent = `共 ${filteredProducts.length} 个产品`;
        }

        // 渲染产品
        function renderProducts() {
            const grid = document.getElementById('productGrid');
            const noResults = document.getElementById('noResults');

            if (filteredProducts.length === 0) {
                grid.innerHTML = '';
                noResults.style.display = 'block';
                return;
            }
            noResults.style.display = 'none';

            const start = (currentPage - 1) * pageSize;
            const end = start + pageSize;
            const pageProducts = filteredProducts.slice(start, end);

            grid.innerHTML = pageProducts.map((p, i) => {
                const price = p.price || '暂无价格';
                const name = escapeHtml(p.name_zh || p.name || '未知');
                const img = p.image_url || '';
                const imgHtml = img 
                    ? `<img src="${img}" loading="lazy" alt="${name}">` 
                    : '<div class="no-image">无图片</div>';
                const globalIndex = products.indexOf(p);
                return `<div class="product-card" onclick="showDetail(${globalIndex})">${imgHtml}<div class="product-info"><div class="product-name">${name}</div><div class="product-price">${price}</div></div></div>`;
            }).join('');
        }

        // 渲染分页
        function renderPagination() {
            const totalPages = Math.ceil(filteredProducts.length / pageSize);
            const pag = document.getElementById('pagination');
            
            if (totalPages <= 1) { pag.innerHTML = ''; return; }

            let html = `<button onclick="goToPage(${currentPage-1})" ${currentPage===1?'disabled':''}>上一页</button>`;
            
            const range = 2;
            for (let i = Math.max(1, currentPage-range); i <= Math.min(totalPages, currentPage+range); i++) {
                html += `<button class="${i===currentPage?'active':''}" onclick="goToPage(${i})">${i}</button>`;
            }
            
            html += `<button onclick="goToPage(${currentPage+1})" ${currentPage===totalPages?'disabled':''}>下一页</button>`;
            html += `<span style="margin-left:8px;color:#888;font-size:13px">${currentPage}/${totalPages}</span>`;
            pag.innerHTML = html;
        }

        function goToPage(p) {
            const totalPages = Math.ceil(filteredProducts.length / pageSize);
            if (p < 1 || p > totalPages) return;
            currentPage = p;
            renderProducts();
            renderPagination();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // 显示详情
        function showDetail(index) {
            const p = products[index];
            const name = escapeHtml(p.name_zh || p.name || '未知');
            const img = p.image_url || '';
            
            document.getElementById('modalTitle').textContent = name;
            
            let imgHtml = img ? `<img src="${img}" alt="${name}">` : '<div class="no-image" style="height:200px">无图片</div>';
            let linkHtml = p.url ? `<a href="${p.url}" target="_blank" style="color:#e74c3c">打开原网页 →</a>` : '';
            
            document.getElementById('modalBody').innerHTML = imgHtml +
                `<div class="detail-row"><span class="detail-label">价格</span><span class="detail-value detail-price">${p.price || '暂无价格'}</span></div>` +
                `<div class="detail-row"><span class="detail-label">来源</span><span class="detail-value"><span class="source-tag">${p.source || '未知'}</span></span></div>` +
                `<div class="detail-row"><span class="detail-label">分类</span><span class="detail-value">${p.category_zh || p.category || '未分类'}</span></div>` +
                `<div class="detail-row"><span class="detail-label">链接</span><span class="detail-value">${linkHtml}</span></div>`;
            
            document.getElementById('modal').classList.add('show');
        }

        function closeModal() {
            document.getElementById('modal').classList.remove('show');
        }

        // 点击背景关闭
        document.getElementById('modal').addEventListener('click', e => {
            if (e.target.id === 'modal') closeModal();
        });

        // HTML转义
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
